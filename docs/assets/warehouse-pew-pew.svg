<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260" role="img" aria-label="Animated warehouse inventory flow">
  <style>
    .bg { fill: #0f172a; }
    .panel { fill: #1e293b; stroke: #334155; stroke-width: 2; }
    .title { fill: #f8fafc; font: 700 22px monospace; }
    .text { fill: #cbd5e1; font: 600 15px monospace; }
    .green { fill: #22c55e; }
    .blue { fill: #3b82f6; }
    .yellow { fill: #facc15; }
    .box { fill: #f59e0b; stroke: #fed7aa; stroke-width: 2; }
    .beam { stroke: #38bdf8; stroke-width: 5; stroke-linecap: round; stroke-dasharray: 10 14; }
    .beam2 { stroke: #f472b6; stroke-width: 5; stroke-linecap: round; stroke-dasharray: 8 16; }
  </style>

  <rect class="bg" width="900" height="260" rx="18"/>

  <text x="36" y="42" class="title">Inventaris Gudang.exe</text>
  <circle cx="820" cy="34" r="7" class="green"/>
  <circle cx="846" cy="34" r="7" class="yellow"/>
  <circle cx="872" cy="34" r="7" fill="#ef4444"/>

  <rect x="42" y="76" width="190" height="124" rx="14" class="panel"/>
  <rect x="355" y="76" width="190" height="124" rx="14" class="panel"/>
  <rect x="668" y="76" width="190" height="124" rx="14" class="panel"/>

  <text x="92" y="113" class="text">BARANG</text>
  <text x="401" y="113" class="text">TRANSAKSI</text>
  <text x="714" y="113" class="text">DASHBOARD</text>

  <g>
    <rect x="103" y="137" width="58" height="42" rx="6" class="box"/>
    <path d="M103 151h58" stroke="#fed7aa" stroke-width="2"/>
    <path d="M132 137v42" stroke="#fed7aa" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -8; 0 0" dur="1.2s" repeatCount="indefinite"/>
  </g>

  <g>
    <rect x="420" y="134" width="62" height="48" rx="8" fill="#2563eb"/>
    <text x="433" y="164" fill="#eff6ff" font="700 17px monospace">CRUD</text>
    <animateTransform attributeName="transform" type="scale" values="1;1.05;1" dur="1.1s" repeatCount="indefinite" additive="sum"/>
  </g>

  <g>
    <rect x="720" y="132" width="82" height="54" rx="9" fill="#16a34a"/>
    <path d="M735 168l16-18 15 12 20-25" fill="none" stroke="#dcfce7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -5; 0 0" dur="1.5s" repeatCount="indefinite"/>
  </g>

  <line x1="242" y1="145" x2="340" y2="145" class="beam">
    <animate attributeName="stroke-dashoffset" values="0;-48" dur="0.7s" repeatCount="indefinite"/>
  </line>
  <line x1="555" y1="145" x2="653" y2="145" class="beam2">
    <animate attributeName="stroke-dashoffset" values="0;-48" dur="0.7s" repeatCount="indefinite"/>
  </line>

  <text x="263" y="130" fill="#38bdf8" font="700 18px monospace">
    pew
    <animate attributeName="opacity" values="0;1;0" dur="0.9s" repeatCount="indefinite"/>
  </text>
  <text x="579" y="130" fill="#f472b6" font="700 18px monospace">
    pew
    <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
  </text>

  <text x="42" y="232" class="text">status: stok update otomatis • query aman • dashboard sinkron • pew pew operational</text>
</svg>
